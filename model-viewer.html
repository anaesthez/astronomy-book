<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Просмотрщик</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #f5f5f5;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            z-index: 10;
        }
        
        .loading.hidden {
            display: none;
        }
        
        .ar-button {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2196F3;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            z-index: 20;
        }
        
        .ar-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">Загрузка модели...</div>
    <button class="ar-button" id="arButton">Посмотреть в AR</button>
    
    <model-viewer 
        id="modelViewer"
        camera-controls
        ar
        ar-modes="webxr scene-viewer quick-look"
        shadow-intensity="1"
        camera-orbit="30deg 70deg 2m"
        ar-scale="auto">
    </model-viewer>

    <script>
        const modelViewer = document.getElementById('modelViewer');
        const loading = document.getElementById('loading');
        const arButton = document.getElementById('arButton');
        
        // Функция определения масштаба по имени модели
        function getScaleByModelName(filename) {
            const name = filename.toLowerCase();
            if (name.includes('earth')) return '0.02 0.02 0.02x';
            if (name.includes('mars')) return '0.1 0.1 0.1';
            if (name.includes('iss')) return '0.05 0.05 0.05';
            if (name.includes('asteroid')) return '0.15 0.15 0.15';
            if (name.includes('meteorite')) return '0.12 0.12 0.12';
            if (name.includes('lunu')) return '0.1 0.1 0.1';
            if (name.includes('saturn')) return '0.12 0.12 0.12';
            if (name.includes('suit')) return '0.4 0.4 0.4';
            return '0.2 0.2 0.2';
        }
        
        // Получаем параметр src из URL
        const urlParams = new URLSearchParams(window.location.search);
        let modelSrc = urlParams.get('src');
        
        // Если src не указан, можно задать модель по умолчанию (опционально)
        // if (!modelSrc) modelSrc = 'resources/earth.glb';
        
        if (modelSrc) {
            modelViewer.src = modelSrc;
            
            // Извлекаем имя файла из пути
            const fileName = modelSrc.split('/').pop();
            
            // Устанавливаем масштаб в зависимости от имени модели
            const scale = getScaleByModelName(fileName);
            modelViewer.setAttribute('scale', scale);
            
            console.log(`Модель: ${fileName}, масштаб: ${scale}`);
            
            modelViewer.addEventListener('load', () => {
                loading.classList.add('hidden');
                arButton.disabled = false;
            });
            
            modelViewer.addEventListener('error', () => {
                loading.textContent = 'Ошибка загрузки модели';
                arButton.disabled = true;
            });
        } else {
            loading.textContent = 'Не указан параметр src';
            arButton.disabled = true;
        }
        
        arButton.addEventListener('click', async () => {
            if (modelViewer.canActivateAR) {
                arButton.disabled = true;
                arButton.textContent = 'Запуск...';
                await modelViewer.activateAR();
                arButton.disabled = false;
                arButton.textContent = 'Посмотреть в AR';
            } else {
                alert('AR не поддерживается');
            }
        });
    </script>
</body>
</html>
